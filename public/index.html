<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student OS - Life Manager</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #c2b6ff, #8ec5fc);
    }

    h1 {
      margin-top: 20px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(2, 280px);
      gap: 30px;
      justify-content: center;
      margin-top: 40px;
    }

    .box {
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    input {
      margin: 6px;
      padding: 10px;
      width: 85%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      margin-top: 8px;
      padding: 10px;
      width: 85%;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6a8df0, #8e5cf0);
      color: white;
      cursor: pointer;
    }

    .view-btn {
      display: block;
      margin-top: 10px;
      text-decoration: none;
      background: #2ecc71;
      padding: 10px;
      border-radius: 8px;
      color: white;
    }

    #timerPreview {
      font-size: 28px;
      margin: 10px 0;
      font-weight: bold;
    }
  </style>

</head>

<body>

<h1>📚 Student OS</h1>
<p>Manage your studies and money smartly</p>

<div class="dashboard">

  <!-- Daily Planner -->

  <div class="box">
    <h2>📅 Daily Planner</h2>
    <form action="/addTask" method="POST">
      <input type="text" name="task" placeholder="Enter Today's Task" required>
      <button type="submit">Add Task</button>
    </form>
    <a href="/tasks" class="view-btn">📋 View Tasks</a>
  </div>

  <!-- Productivity -->

  <div class="box">
    <h2>📘 Productivity</h2>
    <form action="/addStudy" method="POST">
      <input type="text" name="task" placeholder="Enter Study Task" required>
      <input type="number" name="hours" placeholder="Hours" required>
      <button type="submit">Add Study</button>
    </form>
    <a href="/studies" class="view-btn">📊 View Productivity</a>
  </div>

  <!-- Expense Manager -->

  <div class="box">
    <h2>💰 Expense Manager</h2>
    <form action="/addExpense" method="POST">
      <input type="text" name="title" placeholder="Expense Name" required>
      <input type="number" name="amount" placeholder="Amount (₹)" required>
      <button type="submit">Add Expense</button>
    </form>
    <a href="/expenses" class="view-btn">📈 View Expense Records</a>
  </div>

  <!-- Clean Timer (Preview Only) -->

  <div class="box">
    <h2>⏱ Focus Timer</h2>

```
<p id="timerPreview">25:00</p>

<a href="/timer" class="view-btn">🚀 Open Full Timer</a>
```

  </div>

</div>

</body>
</html>
